services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app
      - go-cache:/root/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: spark
      MYSQL_USER: spark
      MYSQL_PASSWORD: spark
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uspark", "-pspark"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  go-cache:
