openapi: 3.0.3
info:
  title: Spark API
  version: 0.1.0
  description: Spark API

servers:
  - url: http://localhost:8080
    description: Local

tags:
  - name: auth
    description: 認証
  - name: images
    description: 画像アップロード
  - name: things
    description: 事柄マスタ
  - name: profile
    description: プロフィール
  - name: users
    description: ユーザー
  - name: health
    description: ヘルスチェック
  - name: rooms
    description: |
      DM ルーム・メッセージ

      ## WebSocket エンドポイント（コード生成対象外）

      以下の2本は WebSocket で提供する。JWT トークンをクエリパラメータ `token` で渡す。

      ### `WS /ws/rooms`
      ルーム一覧画面で接続する。サーバーからルーム一覧の更新通知を受け取る。
      ```json
      { "type": "rooms_updated" }
      ```

      ### `WS /ws/rooms/{roomId}`
      ルーム内画面で接続する。ルーム移動のたびに切り替える。サーバーから新着メッセージを受け取る。
      ```json
      { "type": "new_message", "roomId": 1, "message": { "id": 42, "senderUserId": 10, "content": "こんにちは", "createdAt": "..." } }
      ```

paths:
  /health:
    get:
      tags: [health]
      summary: ヘルスチェック
      operationId: healthCheck
      responses:
        '200':
          description: サービス正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: DBに接続できない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [auth]
      summary: メールアドレスで新規登録
      description: |
        メールアドレスとパスワードで新規登録する。
        登録後、確認用OTPをメールに送信する。
      operationId: registerWithEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 登録成功。OTPをメールに送信した。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSentResponse'
        '409':
          description: メールアドレスが既に登録済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [auth]
      summary: メールアドレスとパスワードでログイン
      description: |
        認証成功後、OTPを登録済みメールアドレスに送信する。
        OTPの検証は `/auth/otp/verify` で行う。
      operationId: loginWithEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 認証成功。OTPをメールに送信した。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSentResponse'
        '401':
          description: メールアドレスまたはパスワードが不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/otp/verify:
    post:
      tags: [auth]
      summary: OTPを検証してトークンを発行
      description: |
        メールで送信された6桁のOTPを検証する。
        成功するとアクセストークンとリフレッシュトークンを返す。
        `profile_exists` が false の場合はプロフィール設定画面へ遷移する。
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP検証成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          description: OTPが不正または期限切れ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/google:
    post:
      tags: [auth]
      summary: GoogleでログインまたはID連携
      description: |
        フロントエンドで取得したGoogleのIDトークンを送信する。
        未登録の場合は自動的に新規登録する。
        `profile_exists` が false の場合はプロフィール設定画面へ遷移する。
      operationId: loginWithGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '200':
          description: 認証成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '401':
          description: IDトークンが不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [auth]
      summary: アクセストークンを更新
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: トークン更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '401':
          description: リフレッシュトークンが不正または期限切れ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [auth]
      summary: ログアウト
      description: リフレッシュトークンを無効化する。
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '204':
          description: ログアウト成功
        '401':
          $ref: '#/components/responses/Unauthorized'

  /images:
    post:
      tags: [images]
      summary: 画像をアップロードする
      description: |
        R2 に画像をアップロードし、登録された画像レコードを返す。
        プロフィールアイコン設定前にこのエンドポイントで画像を登録し、
        返却された `id` を `POST /profiles/me` の `icon_image_id` に指定する。
      operationId: uploadImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, directory]
              properties:
                file:
                  type: string
                  format: binary
                  description: アップロードする画像ファイル
                directory:
                  type: string
                  enum: [icon]
                  description: R2 上の保存先ディレクトリ
      responses:
        '201':
          description: アップロード成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /things:
    get:
      tags: [things]
      summary: 事柄一覧を検索する
      description: |
        プロフィール設定時の入力補助として事柄の候補を返す。
        `q` を指定するとキーワード前方一致で絞り込む。
      operationId: listThings
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: 検索キーワード（前方一致）
          example: プログラミ
      responses:
        '200':
          description: 事柄一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [things]
      summary: 新しい事柄を作成する
      description: 候補にない事柄をユーザーが自由入力で追加する。
      operationId: createThing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThingCreateRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThingResponse'
        '409':
          description: 同名の事柄が既に存在する
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users:
    get:
      tags: [users]
      summary: ユーザー一覧を取得する
      description: |
        登録済みユーザーの一覧を返す。
        `q` を指定すると名前の前方一致で絞り込む。
        `tagIds` を指定するとそのタグを持つユーザーに絞り込む（AND 条件）。
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: 検索キーワード（名前の前方一致）
          example: 田中
        - name: tagIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: 絞り込むタグ ID のリスト（AND 条件）
          example: [1, 2]
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 取得開始位置
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
          description: 取得件数
      responses:
        '200':
          description: ユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/new:
    get:
      tags: [users]
      summary: 新着ユーザー一覧を取得する
      description: |
        登録日時が新しい順にユーザーを返す。
        ホーム画面の「新着」セクションに表示する。
      operationId: listNewUsers
      responses:
        '200':
          description: 新着ユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/recommend:
    get:
      tags: [users]
      summary: おすすめユーザー一覧を取得する
      description: |
        ログイン中ユーザーと共通のタグ（doing / want）が多い順に
        おすすめユーザーを返す。
        共通タグ数・マッチタグ・未マッチタグを含む。
      operationId: listRecommendUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: おすすめユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}:
    get:
      tags: [users]
      summary: ユーザー詳細を取得する
      description: |
        指定したユーザーのプロフィール詳細を返す。
        ログインユーザーとのタグ一致情報と、既に気になるを送信済みかどうかを含む。
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 取得対象のユーザー ID
      responses:
        '200':
          description: ユーザー詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/interests:
    post:
      tags: [users]
      summary: 気になるを送る
      description: |
        指定したユーザーに「気になる」を送る。
        相手もすでに自分に気になるを送っていた場合は `matched` が true になる。
      operationId: sendInterest
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 気になるを送る対象のユーザー ID
      responses:
        '200':
          description: 気になる送信成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestResponse'
        '409':
          description: すでに気になるを送信済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /interests:
    get:
      tags: [users]
      summary: 気になる一覧を取得する
      description: |
        `direction=sent` で自分が送った気になる、`direction=received` で相手から受け取った気になるの一覧を返す。
        offset / limit でページネーションする。
      operationId: listInterests
      security:
        - bearerAuth: []
      parameters:
        - name: direction
          in: query
          required: true
          schema:
            type: string
            enum: [sent, received]
          description: sent = 自分から送った / received = 相手から受け取った
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 取得開始位置
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
          description: 取得件数
      responses:
        '200':
          description: 気になる一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/pickup:
    get:
      tags: [users]
      summary: 今日のピックアップユーザー一覧を取得する
      description: |
        ログイン中ユーザーと共通のタグ（doing / want）が多い順に
        おすすめユーザーを返す。
        共通タグ数が多い上位数件を返す。
      operationId: listPickupUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ピックアップユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PickupUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profiles/me:
    post:
      tags: [profile]
      summary: プロフィールを初回作成する
      description: |
        OTP認証後のプロフィール設定画面で呼び出す。
        `doing_thing_ids` と `want_thing_ids` には事前に `/things` で取得または作成した thing の ID を渡す。
      operationId: createMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCreateRequest'
      responses:
        '201':
          description: プロフィール作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '409':
          description: プロフィールが既に存在する
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [profile]
      summary: 自分のプロフィールを取得する
      description: ホーム画面の自分の情報表示に使用する。
      operationId: getMyProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: プロフィール取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: プロフィールが未作成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [profile]
      summary: 自分のプロフィールを更新する
      description: ホーム画面などからプロフィールを編集する。指定したフィールドのみ更新する。
      operationId: updateMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: プロフィールが未作成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /messages:
    post:
      tags: [rooms]
      summary: メッセージを送信する
      operationId: sendMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: 送信成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: ルームへのアクセス権限がない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ルームが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:
    SendMessageRequest:
      type: object
      required: [roomId, content]
      properties:
        roomId:
          type: integer
          example: 1
        content:
          type: string
          minLength: 1
          maxLength: 1000
          example: はじめまして！

    MessageResponse:
      type: object
      required: [id, roomId, senderUserId, content, isMine, createdAt]
      properties:
        id:
          type: integer
          example: 1
        roomId:
          type: integer
          example: 1
        senderUserId:
          type: integer
          example: 10
        content:
          type: string
          example: はじめまして！
        isMine:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: password123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: password123

    OtpVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        code:
          type: string
          pattern: '^\d{6}$'
          description: メールで送信された6桁の数字
          example: '123456'

    GoogleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Googleから取得したIDトークン

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ThingCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
          example: プログラミング

    ProfileCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
          example: 田中太郎
        bio:
          type: string
          nullable: true
          example: よろしくお願いします
        iconImageId:
          type: integer
          nullable: true
          description: 事前に POST /images でアップロードした画像の ID
        doingThingIds:
          type: array
          items:
            type: integer
          description: やっていることの thing ID リスト
          example: [1, 2]
        wantThingIds:
          type: array
          items:
            type: integer
          description: やってみたいことの thing ID リスト
          example: [3, 4]

    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        bio:
          type: string
          nullable: true
        iconImageId:
          type: integer
          nullable: true
        doingThingIds:
          type: array
          items:
            type: integer
          description: やっていることを上書き更新する thing ID リスト
        wantThingIds:
          type: array
          items:
            type: integer
          description: やってみたいことを上書き更新する thing ID リスト

    OtpSentResponse:
      type: object
      properties:
        message:
          type: string
          example: OTPをメールに送信しました
        expiresIn:
          type: integer
          description: OTPの有効期限（秒）
          example: 300

    AuthTokensResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
          example: Bearer
        expiresIn:
          type: integer
          description: アクセストークンの有効期限（秒）
          example: 3600
        profileExists:
          type: boolean
          description: |
            プロフィールが設定済みかどうか。
            false の場合はプロフィール設定画面へ遷移する。

